<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2030"/>
      <stop offset="100%" stop-color="#232B38"/>
    </linearGradient>
    <linearGradient id="plaque" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EDE3D3"/>
      <stop offset="100%" stop-color="#D9CEBC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- NFC plaque illustration -->
  <g transform="translate(750, 315)">
    <!-- Plaque body -->
    <rect x="-120" y="-170" width="240" height="340" rx="18" ry="18" fill="url(#plaque)" opacity="0.95"/>
    <!-- Plaque shadow -->
    <rect x="-116" y="-166" width="240" height="340" rx="18" ry="18" fill="#1A2030" opacity="0.15" transform="translate(6,6)"/>
    <!-- Business name area -->
    <rect x="-90" y="-130" width="180" height="36" rx="4" fill="#1A2030" opacity="0.12"/>
    <rect x="-60" y="-120" width="120" height="16" rx="2" fill="#1A2030" opacity="0.25"/>
    <!-- NFC tap buttons -->
    <rect x="-80" y="20" width="60" height="60" rx="12" fill="#E2683C" opacity="0.9"/>
    <rect x="-10" y="20" width="60" height="60" rx="12" fill="#2A3A50" opacity="0.9"/>
    <rect x="60" y="20" width="60" height="60" rx="12" fill="#E2683C" opacity="0.7"/>
    <!-- Star icon in first button -->
    <polygon points="-50,38 -47,48 -37,48 -45,54 -42,64 -50,58 -58,64 -55,54 -63,48 -53,48" fill="#F5F3EE"/>
    <!-- WiFi-ish icon in second button -->
    <circle cx="20" cy="50" r="6" fill="#F5F3EE" opacity="0.9"/>
    <path d="M 6 38 Q 20 28 34 38" stroke="#F5F3EE" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 11 44 Q 20 37 29 44" stroke="#F5F3EE" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- NFC wave in third button -->
    <circle cx="90" cy="50" r="6" fill="#F5F3EE" opacity="0.9"/>
    <path d="M 76 38 Q 90 28 104 38" stroke="#F5F3EE" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 81 44 Q 90 37 99 44" stroke="#F5F3EE" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Terra accent dot -->
    <circle cx="0" cy="-60" r="14" fill="#E2683C" opacity="0.8"/>
    <!-- NFC symbol -->
    <text x="0" y="-54" font-family="system-ui" font-size="14" font-weight="600" fill="#F5F3EE" text-anchor="middle">NFC</text>
  </g>

  <!-- Left: Wordmark and tagline -->
  <g transform="translate(100, 315)">
    <!-- Tapiko wordmark -->
    <text x="0" y="-60" font-family="Georgia, serif" font-size="96" font-weight="400" fill="#F5F3EE" letter-spacing="-2">Tapiko</text>
    <circle cx="548" cy="-84" r="10" fill="#E2683C"/>

    <!-- Tagline -->
    <text x="0" y="-10" font-family="system-ui, sans-serif" font-size="26" font-weight="400" fill="#F5F3EE" opacity="0.65" letter-spacing="0.5">Custom NFC plaques · Designed in Barcelona</text>

    <!-- Separator -->
    <rect x="0" y="30" width="64" height="3" rx="2" fill="#E2683C"/>

    <!-- Sub-line -->
    <text x="0" y="80" font-family="system-ui, sans-serif" font-size="20" fill="#F5F3EE" opacity="0.45" letter-spacing="1">One tap. Reviews. Followers. Menu.</text>
  </g>
</svg>
